<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookstore — Add Book</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav>
    <span class="nav-brand">📚 Libreria</span>
    <input type="checkbox" id="nav-toggle" class="nav-toggle" aria-hidden="true">
    <label for="nav-toggle" class="nav-burger" aria-label="Toggle menu"><span></span><span></span><span></span></label>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Search</a>
      <a href="stats.html" class="nav-link">Stats</a>
      <a href="library.html" class="nav-link">Library</a>
      <a href="orders.html" class="nav-link">Orders</a>
      <a href="sales.html" class="nav-link">Sales</a>
      <a href="events.html" class="nav-link">Events</a>
      <button class="nav-add" onclick="location.href='add-book.html'">+ Add Book</button>
    </div>
  </nav>

  <div class="page">
    <div class="page-title" id="form-title">Add a Book</div>

    <div class="form-card">
      <form id="book-form">
        <input type="hidden" id="book-id">

        <div class="isbn-lookup-block">
          <div class="form-row" style="margin-bottom:10px">
            <label for="isbn">ISBN — start here</label>
            <div class="isbn-row">
              <input type="text" id="isbn" placeholder="Type or scan ISBN, e.g. 9780156012195" inputmode="numeric" autocomplete="off" autofocus>
              <button type="button" class="btn-secondary isbn-lookup-btn" id="lookup-btn">Look up</button>
            </div>
            <div class="hint">Title, author and cover are fetched automatically. Fills in as soon as a full ISBN is entered.</div>
          </div>
          <div class="isbn-status" id="isbn-status" hidden></div>
          <div class="dup-warning" id="dup-warning" hidden>
            <span id="dup-warning-text"></span>
            <span class="dup-actions">
              <button type="button" class="btn-icon" id="dup-add-stock">+1 copy</button>
              <button type="button" class="btn-icon" id="dup-edit">Edit existing</button>
            </span>
          </div>
          <div class="lookup-result" id="lookup-result" hidden>
            <img id="cover-preview" alt="Book cover" onerror="this.hidden = true">
            <div class="lookup-result-info">
              <span class="lookup-result-title" id="lookup-title"></span>
              <span class="lookup-result-author" id="lookup-author"></span>
            </div>
          </div>
        </div>

        <div class="form-row">
          <label for="title">Book Title *</label>
          <input type="text" id="title" placeholder="e.g. The Little Prince" required>
        </div>

        <div class="form-row">
          <label for="author">Author</label>
          <input type="text" id="author" placeholder="e.g. Antoine de Saint-Exupéry">
        </div>

        <div class="form-row">
          <label for="age_group">Age Group *</label>
          <select id="age_group" required>
            <option value="" disabled selected>Select age group…</option>
            <option value="Children (0–5)">Children (0–5)</option>
            <option value="Children (6–12)">Children (6–12)</option>
            <option value="Young Adult">Young Adult (13–18)</option>
            <option value="Adult">Adult</option>
          </select>
        </div>

        <div class="form-row-2">
          <div class="form-row" style="margin-bottom:0">
            <label for="price_bought">Cost Price (€) *</label>
            <input type="number" id="price_bought" placeholder="0.00" step="0.01" min="0" required>
          </div>
          <div class="form-row" style="margin-bottom:0">
            <label for="price_sold">Selling Price (€) *</label>
            <input type="number" id="price_sold" placeholder="0.00" step="0.01" min="0" required>
          </div>
        </div>

        <div class="form-row" style="margin-top:18px">
          <label for="quantity">Quantity in Stock *</label>
          <input type="number" id="quantity" placeholder="0" min="0" required>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-primary" id="submit-btn">Add Book</button>
          <button type="button" class="btn-secondary" onclick="location.href='index.html'">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script type="module" src="add-book.js"></script>
</body>
</html>
