<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookstore — Search</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav>
    <span class="nav-brand">📚 Libreria</span>
    <a href="index.html" class="nav-link active">Search</a>
    <a href="stats.html" class="nav-link">Stats</a>
    <a href="library.html" class="nav-link">Library</a>
    <a href="orders.html" class="nav-link">Orders</a>
    <a href="sales.html" class="nav-link">Sales</a>
    <a href="events.html" class="nav-link">Events</a>
    <button class="nav-add" onclick="location.href='add-book.html'">+ Add Book</button>
  </nav>

  <div class="page">
    <div class="page-title">Search Inventory</div>

    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="Search by title or author…" autocomplete="off">
    </div>

    <div class="filters" id="filters">
      <button class="filter-btn active" data-group="all">All</button>
      <button class="filter-btn" data-group="Children (0–5)">Children 0–5</button>
      <button class="filter-btn" data-group="Children (6–12)">Children 6–12</button>
      <button class="filter-btn" data-group="Young Adult">Young Adult</button>
      <button class="filter-btn" data-group="Adult">Adult</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Title</th>
            <th>Author</th>
            <th>Age Group</th>
            <th>Qty</th>
            <th>Cost</th>
            <th>Price</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="results">
          <tr><td colspan="7"><div class="empty"><div class="empty-icon">🔍</div><p>Loading inventory…</p></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script type="module" src="search.js"></script>
</body>
</html>
