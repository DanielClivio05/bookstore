<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookstore — Orders</title>
  <link rel="stylesheet" href="style.css">
  <style>
    @media print {
      nav, .order-controls, .btn-primary, .page-title { display: none; }
      body { background: #fff; }
      .table-wrap { box-shadow: none; border: none; }
    }
  </style>
</head>
<body>

  <nav>
    <span class="nav-brand">📚 Libreria</span>
    <a href="index.html" class="nav-link">Search</a>
    <a href="stats.html" class="nav-link">Stats</a>
    <a href="library.html" class="nav-link">Library</a>
    <a href="orders.html" class="nav-link active">Orders</a>
    <a href="sales.html" class="nav-link">Sales</a>
    <button class="nav-add" onclick="location.href='add-book.html'">+ Add Book</button>
  </nav>

  <div class="page">
    <div class="page-title">Restock Orders</div>

    <div class="order-controls">
      <label>
        Show books with fewer than
        <input type="number" id="threshold" value="3" min="1" max="50">
        copies
      </label>
      <button class="btn-primary" onclick="window.print()">🖨️ Print Order</button>
    </div>

    <p class="order-note" id="order-note"></p>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Title</th>
            <th>Author</th>
            <th>Age Group</th>
            <th>In Stock</th>
            <th>Order Qty</th>
          </tr>
        </thead>
        <tbody id="order-list">
          <tr><td colspan="5"><div class="empty"><div class="empty-icon">📦</div><p>Loading…</p></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script type="module" src="orders.js"></script>
</body>
</html>
